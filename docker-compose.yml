# PC(WSL) 개발용 컨테이너 — 빌드·import 검증 전용.
# 실제 로봇 주행(조이스틱·카메라·모터)은 D3-G 보드에서 수행합니다.
services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: 2026-smh-dev:latest
    container_name: 2026-smh-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
    stdin_open: true
    tty: true
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
    # PC 개발·빌드만 목적이므로 host 네트워크는 사용하지 않습니다.
