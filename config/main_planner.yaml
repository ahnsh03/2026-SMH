# Main driving planner — single place for course, Pure Pursuit and mission tuning.
# route.mode may also be overridden at launch: route_mode:=in|out

route:
  # OUT forks/S-curve soft-corridor pack was unstable; IN + simple mask COM for now.
  mode: IN
  # OUT/IN fork layers: 0 = left, 1 = right. Competition default = RIGHT on sign miss.
  default_out_branch_rank: 1
  # Confirm the same direction before latching it. Once a fork starts, its
  # direction/rank stays locked until the manoeuvre completes.
  sign_confirm_frames: 3
  # OUT: arm on capture even if sign was missed; sign still preferred when seen.
  out_fork_require_sign: false
  out_fork_sign_hold_sec: 3.0
  # Also require tip+stretch capture (score_out_fork_capture).
  out_fork_require_capture: true
  # Keep false: forced_turn:= only chooses L/R rank, does not arm forks all lap.
  # Set true only for sign-less fork unit tests / rail review.
  # Production: camera signs (or require_sign=false) arm forks — keeps NORMAL white-only stable.
  out_fork_forced_turn_arms: false
  # Keep the last selected branch through short fork-detection flicker.
  fork_path_hold_frames: 3
  # Prevent the same junction from immediately retriggering after exit.
  fork_reentry_cooldown_sec: 2.0
  # IN: yellow-first for roundabout paint. OUT forces white in code.
  prefer_yellow: true
pure_pursuit:
  # Soft fork/circle PP — ego-blob mask_p is primary on NORMAL.
  lookahead_m: 0.75
  curve_lookahead_m: 0.55
  curvature_full_scale: 0.8
  lookahead_shrink_rate_m: 0.18
  lookahead_grow_rate_m: 0.06
  curvature_near_m: 0.30
  curvature_mid_m: 0.60
  curvature_far_m: 0.90
  near_path_fit_span_m: 0.30
  near_path_extrapolation_max_m: 0.35
  # board/race-control: D-Racer real-car geometry ONLY (not LIMO/Gazebo).
  # L=0.175 m, R_min=0.385 m → δ_max=atan(L/R)≈0.4266 rad (≈24.44°).
  wheelbase_m: 0.175
  max_steer_angle_rad: 0.4266
  max_steering_command: 1.0
  # ~0.28/frame @ 10 Hz — hold center without in-lane snap/wobble.
  steering_rate_limit_per_sec: 2.8
  path_lost_steering_return_rate_per_sec: 2.0
  nominal_control_dt_sec: 0.10
  cte_gain: 0.08
  cte_softening_m: 0.22
  cte_deadband_m: 0.025
  max_cte_steering: 0.16
  heading_gain: 0.20
  heading_preview_m: 0.50
  heading_sample_span_m: 0.15
  max_heading_steering: 0.16
  steer_command_deadband: 0.04

speed:
  # Competition cruise; soft ego-follow scales down on error/curve.
  cruise_throttle: 0.24
  curve_throttle: 0.18
  curve_steering_threshold: 0.25
  default_throttle: 0.0
  error_speed_cte_full_m: 0.18
  error_speed_steer_full: 0.42
  error_speed_min_scale: 0.45

# NORMAL: ego-blob row-mid — soft zone + temporal COM (anti-wobble).
# Fork still PP when forkish.
tracker:
  normal: mask_p

# Stronger temporal hold — kills in-lane COM flicker.
track_state:
  err_alpha: 0.22
  err_max_jump: 0.20
  path_y_alpha: 0.22
  path_y_max_jump_m: 0.08
  half_width_m: 0.175
  enable_path_hold: true
  delay_pred_sec: 0.0
  throttle_speed_scale_mps: 1.0

# Stanley-lite: yaw (lane angle) first, gentle CTE, EMA + rate-limit.
stanley:
  k_cte: 0.90
  k_yaw: 1.05
  v_soft: 0.16
  curvature_ff_gain: 0.28
  steer_alpha: 0.20

mask_pursuit:
  # Geometry follow (docs/vehicle-geometry.md): e_y[m] → atan / δ_max.
  # Already-coded lateral_atan — no new experimental tracker.
  # steer_law: sim_v2 | image_p | lateral_atan
  # center_mode: area | row_mid | dist_ridge
  steer_law: lateral_atan
  steer_k: 1.0
  steer_alpha: 0.20
  near_band_ratio: 0.78
  far_band_ratio: 0.92
  far_blend: 0.08
  use_path_correction: false
  paint_blend_max: 0.12
  paint_blend_lo: 0.30
  paint_blend_hi: 0.65
  center_mode: row_mid
  erode_px: 1
  # Course free-space prior (~lane); tread T=0.12 used as half-width elsewhere.
  lane_width_m: 0.35
  single_side_width_ratio: 0.72
  # Long hold so brief blob loss keeps last steer (breakthrough).
  occlusion_hold_frames: 28
  error_deadband: 0.05
  blend_error_lo: 0.14
  blend_error_hi: 0.55
  blend_curvature_lo: 0.35
  blend_curvature_hi: 1.00
  hybrid_steer_alpha: 0.18
  min_area_px: 80.0
  curve_steer_threshold: 0.35
  curve_speed_scale: 0.70
  corridor_mode: off
  corridor_near_fork: true
  corridor_half_width_m: 0.42
  path_weight_sigma_m: 0.28
  fork_force_pp: true
  require_color_path: true

path:
  # rear_axle_to_camera_m — D-Racer: 0.175 + 0.025 = 0.200 m
  # (docs/vehicle-geometry.md §4.1.1). Never use Gazebo 0.265 here.
  perception_to_rear_axle_x_m: 0.200
  min_points: 5
  white_min_confidence: 0.15
  yellow_min_confidence: 0.12
  yellow_valid_on_frames: 2
  # Perception flicker: hold last steer + crawl (do not snap neutral / stop early).
  path_lost_hold_frames: 20
  path_lost_stop_frames: 80
  path_lost_crawl_throttle: 0.14
  fork_exit_off_frames: 8

roundabout:
  # Enter circle mode once a stable yellow path or a yellow crossing line appears.
  entry_on_yellow: true
  min_lap_time_sec: 5.0
  # lateral_rank: 0=left(exit), 1=right(keep circle) — moment pass policy §5.1.4
  exit_branch_rank: 0
  in_exit_use_moment: true
  in_keep_passes: 1
  in_keep_branch_rank: 1
  branch_required_events: 2
  crossing_required_events: 2
  # Stricter than NORMAL fork flicker — reduces false exit arms in-circle.
  branch_on_frames: 6
  branch_off_frames: 10
  crossing_on_frames: 3
  crossing_off_frames: 6
  # While circulating, do not switch mask→fork PP until moment selects a rank.
  circle_ignore_fork_for_control: true
  # Circle: paint centerline PP (yellow), not road_clean COM.
  circle_tracker: pp
  # Slightly longer Ld softens circle PP snaps (still short enough for ring).
  lookahead_m: 0.55
  # Match slow ego-follow cruise; raise if ring stalls on carpet.
  throttle: 0.18

signals:
  # Competition: YOLO lights + ArUco + direction signs ALL ON.
  # OpenCV HSV lights disabled (false positives on nearby colors).
  # Mid-track only: traffic_pass:=true (skips green wait / red stop).
  require_green_to_start: true
  # No green within this many seconds → assume green and start.
  green_wait_timeout_sec: 30.0
  stop_on_red: true
  stop_on_aruco: true
  traffic_pass: false

safety:
  # Perception on this board often takes 0.8–1.5s/frame. Watchdog freshness is
  # stamped AFTER step(); keep margin above one missed frame gap.
  command_watchdog_sec: 2.0

debug:
  log_state_changes: true
  log_decision_changes: true
  # State/path changes publish immediately; numeric snapshots use this rate.
  publish_hz: 2.0
