# Lane planner / Pure Pursuit gains (Phase 2+)
# Tuned with: scripts/vision_tune/tune_lane_control.py
# Sim and real car share this file (same /camera + /control topics).
#
# Sim SSOT = LIMO Gazebo Ackermann (see docs/vehicle-geometry.md):
#   wheelbase_m: 0.24
#   max_steer_angle_rad: 0.5236  (±30°)
#
# D-Racer (real) measured 2026-07-12:
#   wheelbase_m: 0.175
#   tread_m: 0.120
#   max_steer_angle_rad: 0.3054   # δ_max = 17.5° (tire angle; PP SSOT)
#   R_min_m: 0.535                # diameter 107 cm; cross-check (~3.7% vs L/tanδ)
#   camera: 0.13 m, 10° pitch down (same as sim IPM)
# Board override example:
#   wheelbase_m:=0.175 max_steer_angle_rad:=0.3054
# Do NOT copy sim L/δ_max blindly.
#
# follow_color: white | yellow — single mode only (no auto switch). Override with
#   ros2 launch … lane_follow_color:=yellow

follow_color: white
# Pure Pursuit look-ahead L_d [m] (target point at x=L_d on centerline).
lookahead_x_m: 0.80
# Bicycle geometry — LIMO Gazebo defaults.
wheelbase_m: 0.24
max_steer_angle_rad: 0.5236
# Optional: L_d = clip(gain * speed_mps, 0.3, 1.5). 0 = use fixed lookahead_x_m.
lookahead_gain: 0.0
ema_alpha: 0.40
# Max |Δsteer| per control step (~10 Hz publish).
steer_rate_limit: 0.15
max_steer: 1.0
track_half_width_m: 0.175
# When |steer| exceeds thresh, multiply throttle by scale.
steer_slowdown_thresh: 0.50
steer_slowdown_scale: 0.80
# Confidence floor when both/one side seen.
min_confidence: 0.15
hold_decay: 0.92
