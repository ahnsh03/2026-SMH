# Team vehicle config (overrides D-Racer-Kit default via init_workspace.sh)
# C920e native 16:9 (1920x1080) — output 320x180 avoids videoscale distortion.

# Camera configuration
USB_CAM: true
MIPI_CAM: false
USB_CAM_DEVICE: /dev/video1
IMAGE_WIDTH: 320
IMAGE_HEIGHT: 180
ROI_TOP: 50
ROI_LEFT: 0

# Vehicle control parameters
# Day0 board: set this so a straight corridor holds with near-zero planner steer.
# Re-check after mounting / tire wear; do not compensate with mask_steer_k.
STEER_TRIM: 0.10000000000000003

# Web server configuration
# 0.0.0.0 binds every interface, so the monitor still comes up when the
# board's IP changes with the network.
WEB_HOST: 0.0.0.0
WEB_PORT: 5000
BATTERY_TOPIC: /battery_status
IMAGE_TOPIC: /camera/image/compressed
CONTROL_TOPIC: /control
JOYSTICK_TOPIC: /joystick
STORAGE_PATH: /
IMAGE_DISPLAY_WIDTH: 640
IMAGE_DISPLAY_HEIGHT: 360
OPENCV_DEBUG_MODE : false
