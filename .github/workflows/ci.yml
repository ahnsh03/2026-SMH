name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-inference:
    runs-on: ubuntu-22.04
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # Match Dockerfile / D3-G: inference ArUco & camera decode need OpenCV.
      - name: Install Python OpenCV and Gazebo ROS deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-opencv python3-numpy \
            ros-humble-gazebo-ros-pkgs ros-humble-robot-state-publisher
          rm -rf /var/lib/apt/lists/*

      - name: Init workspace
        run: |
          chmod +x scripts/init_workspace.sh
          ./scripts/init_workspace.sh

      - name: Build inference and dracer_sim packages
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install --packages-up-to dracer_sim inference

      - name: Python import check
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          python3 -c "from inference.pipeline import fuse_control, run_perception; print('ok')"
