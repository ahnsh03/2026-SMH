# D-Racer compatible simulation interface (Gazebo LIMO Ackermann)
# Same topics/conventions as D-Racer-Kit on real hardware — inference/monitor work unchanged.

camera:
  compressed_topic: /camera/image/compressed
  raw_topic: /camera/image_raw          # OpenCV 프리뷰 (320x180, 시뮬 전용)
  gazebo_source: /gazebo/camera/image_raw
  gazebo_native_width_px: 640
  gazebo_native_height_px: 360          # 16:9 (C920e)
  width_px: 320
  height_px: 180
  horizontal_fov_rad: 1.22906           # Logitech C920e
  frame_id: camera
  mount:
    height_ground_m: 0.13               # 추정 — 실차 실측 후 갱신
    ahead_front_axle_m: 0.025
    pitch_down_deg: 10.0                # 추정 — 실차 실측 후 갱신

control:
  input_topic: /control                 # control_msgs/Control
  gazebo_cmd_vel: /cmd_vel              # internal (Ackermann plugin)
  # D-Racer norms (실차와 동일):
  #   steering  -1=left, +1=right
  #   throttle  -1=reverse, +1=forward
  # sim_control_bridge maps +steering → −angular.z (Gazebo +Z = left)

battery:
  topic: /battery_status                # battery_msgs/Battery (stub 80%)

robot:
  type: limo_ackermann                  # vendor/limo_car (기본; robot:=dracer는 diff_drive)
  wheelbase_m: 0.24
  max_steer_rad: 0.5236
  spawn:
    x: 2.6
    y: -3.92
    z: 0.15
    yaw: -3.14

track:
  width_m: 12.0
  height_m: 8.9975
