# Metric grid mat placed beside the CW track for BEV scale tuning.
# Texture baked by: python3 scripts/prepare_bev_calib_mat.py

bev_calib_mat:
  width_m: 4.0
  height_m: 2.0
  pixels_per_meter: 250
  minor_m: 0.1
  major_m: 0.5
  track_width_m: 0.35

  # World pose (track_plane is 12×8.9975 m centered at origin, z≈0.01).
  # Place just south of the track near the default spawn X so the mat is
  # visible beside the course without overlapping asphalt.
  pose:
    x: 2.5
    y: -6.5
    z: 0.012
    yaw: 0.0
